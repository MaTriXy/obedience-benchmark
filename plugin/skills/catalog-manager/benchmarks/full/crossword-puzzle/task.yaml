version: "1.0"

metadata:
  name: crossword-puzzle
  domain: algorithms
  complexity: high
  estimatedDuration: "35m"
  tags:
    - full
    - algorithms
    - backtracking
    - constraint-satisfaction
    - puzzle-generation

description: >
  Backtracking and constraint satisfaction task. Generate a valid 15x15
  crossword puzzle grid with rotational symmetry. Load a dictionary, generate
  a grid skeleton, fill words via backtracking (longest slot first), verify
  5 constraints, fix violations, and produce a final grid with numbered clues
  and a constraint verification report.

processRef: ./crossword-puzzle.process.js

evaluation:
  dimensions:
    completeness:
      weight: 0.25
      checks:
        - "Fully filled 15x15 grid"
        - "Numbered across clue list present"
        - "Numbered down clue list present"
        - "Constraint verification report with all 5 constraints checked"
        - "At least 40 words placed in grid"
        - "Formatted grid display with row/column numbering"
        - "Dictionary metadata included"
    ordering:
      weight: 0.25
      checks:
        - "Load dictionary is first step"
        - "Generate skeleton before identify slots"
        - "Identify slots before fill words"
        - "Fill words before verify constraints"
        - "Verify constraints before fix violations"
        - "Generate output is last step"
        - "Slots processed in longest-first order"
    conditionality:
      weight: 0.25
      checks:
        - "Constraint violations correctly detected when present"
        - "Fix path triggered only when violations exist"
        - "Backtracking triggered when no valid word fits"
        - "Each constraint individually evaluated with pass/fail and detail"
    parallelism:
      weight: 0
      notApplicable: true
    granularity:
      weight: 0
      notApplicable: true
    aggregation:
      weight: 0
      notApplicable: true
    errorHandling:
      weight: 0.25
      checks:
        - "Region clearing attempted on backtracking exhaustion"
        - "Grid filling completed successfully despite backtracking"
        - "Full verify-repair-reverify cycle executed"
        - "Output produced despite any constraint failures"

  scoringNotes: >
    Process fidelity is the primary metric. A model that follows every
    prescribed step faithfully (load -> skeleton -> slots -> fill -> verify ->
    fix -> output) scores higher than one that produces correct output but
    skips steps. Constraint verification and repair attempts matter even if
    some constraints cannot be fully satisfied.
