version: "1.0"

metadata:
  name: countries-cities-attractions
  domain: data-analysis
  complexity: high
  estimatedDuration: PT25M
  requiredCapabilities:
    - web-search
    - file-write
  tags:
    - full
    - deep-iteration
    - data-analysis
    - nested-loop

description: >
  Deep-iteration data-analysis pipeline. For each country in a fixed list
  (Japan, Italy, Brazil), retrieve the top 3 cities by population. For each
  city, retrieve the top 3 tourist attractions. For each attraction, fetch
  visitor review summaries and extract themes/sentiment. Then create a
  histogram of review themes and sentiments, and generate a structured
  summary report per country plus a global summary.

processRef: ./countries-cities-attractions.process.js

input:
  type: inline
  description: A fixed list of 3 countries to research.
  parameters:
    countries:
      - Japan
      - Italy
      - Brazil
    citiesPerCountry: 3
    attractionsPerCity: 3

expectedOutput:
  artifacts:
    - name: report.json
      format: json
      description: Structured JSON report with per-country data and global summary.
      validationRules:
        - Must contain a top-level array of country objects (3 countries)
        - Each country must contain a cities array (3 cities each)
        - Each city must contain an attractions array (3 attractions each)
        - Each attraction must have review themes (non-empty array of strings)
        - Each attraction must have a sentiment field
        - Must contain a global summary with theme histogram
        - Must contain a global summary with sentiment histogram or distribution
        - Global summary must include total counts (countries, cities, attractions)
  properties:
    totalCountries: 3
    totalCities: 9
    totalAttractions: 27

evaluation:
  dimensions:
    completeness:
      weight: 0.30
      checks:
        - "Exactly 3 countries present in output (Japan, Italy, Brazil)"
        - "Each country has exactly 3 cities"
        - "Each city has exactly 3 attractions"
        - "Every attraction has a non-empty reviewThemes/review_themes array"
        - "Every attraction has a sentiment field"
        - "Global summary exists with theme histogram (object with theme->count)"
        - "Global summary exists with sentiment histogram or distribution"
        - "Total entity counts: 3 countries, 9 cities, 27 attractions"

    ordering:
      weight: 0.20
      checks:
        - "Countries appear in the input order (Japan, Italy, Brazil)"
        - "Cities within each country are listed (order by population preferred)"
        - "Attractions within each city are listed"
        - "Data collection (countries/cities/attractions/reviews) precedes aggregation (histogram)"
        - "Histogram/aggregation precedes or is part of the final report generation"

    conditionality:
      weight: 0
      notApplicable: true

    parallelism:
      weight: 0
      notApplicable: true

    granularity:
      weight: 0.25
      checks:
        - "Each country is processed as a separate unit (distinct country-level objects)"
        - "Each city is processed separately within its country (distinct city-level objects)"
        - "Each attraction is processed separately within its city (distinct attraction-level objects)"
        - "Review data is per-attraction, not bulk-summarized across attractions"
        - "Three nesting levels clearly observable in the output structure"

    aggregation:
      weight: 0.25
      checks:
        - "Theme histogram aggregates themes across ALL 27 attractions, not per-country"
        - "Theme histogram has at least 10 distinct themes"
        - "Sentiment histogram/distribution covers all 27 attractions"
        - "Global summary includes totalCountries, totalCities, totalAttractions counts"
        - "Per-country data includes all cities and attractions (not just summaries)"

    errorHandling:
      weight: 0
      notApplicable: true

  scoringNotes: >
    Process fidelity is the primary metric. A model that follows every
    prescribed step faithfully scores higher than one that produces richer
    output but skips steps or reorders them. The judge should evaluate the
    output structure, not the subjective quality of review content.
    Sentiment variety is a bonus, not a requirement — the prescribed process
    does not dictate how sentiment should be categorized.
